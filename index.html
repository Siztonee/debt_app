<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Дневник расчётов — учёт товаров и долгов" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Дневник" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Дневник расчётов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-mark">◈</span>
          <div>
            <div class="logo-title">Дневник расчётов</div>
            <div class="logo-sub">Учёт товаров и долгов</div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-icon" id="exportBtn" title="Экспорт CSV">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="btn-primary" id="addBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Добавить
          </button>
        </div>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Взято товаров</div>
        <div class="stat-value" id="totalTaken">0 ₸</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div class="stat-label">Сдано</div>
        <div class="stat-value positive" id="totalPaid">0 ₸</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-card">
        <div class="stat-label">Общий долг</div>
        <div class="stat-value accent" id="totalDebt">0 ₸</div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="main">
      <!-- Empty state -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">◈</div>
        <div class="empty-title">Записей пока нет</div>
        <div class="empty-sub">Нажмите «Добавить» чтобы внести первую запись</div>
      </div>

      <!-- Table -->
      <div class="table-wrapper" id="tableWrapper" style="display:none">
        <table class="table">
          <thead>
            <tr>
              <th class="th-date">Дата</th>
              <th class="th-taken">Взято товаров</th>
              <th class="th-paid">Сдано</th>
              <th class="th-debt">Долг</th>
              <th class="th-actions"></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
          <tfoot>
            <tr class="tfoot-row">
              <td class="tf-label">Итого</td>
              <td class="tf-taken" id="footTaken">—</td>
              <td class="tf-paid" id="footPaid">—</td>
              <td class="tf-debt" id="footDebt">—</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Новая запись</span>
        <button class="btn-icon modal-close" id="modalClose">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label class="label">Дата</label>
          <input type="date" class="input" id="fieldDate" />
        </div>
        <div class="field">
          <label class="label">На какую сумму взято товаров</label>
          <div class="input-wrap">
            <input type="number" class="input" id="fieldTaken" placeholder="0" min="0" step="0.01" inputmode="decimal" />
            <span class="input-suffix">₸</span>
          </div>
        </div>
        <div class="field">
          <label class="label">Сдано</label>
          <div class="input-wrap">
            <input type="number" class="input" id="fieldPaid" placeholder="0" min="0" step="0.01" inputmode="decimal" />
            <span class="input-suffix">₸</span>
          </div>
        </div>
        <div class="field debt-preview">
          <div class="debt-preview-label">Долг по записи</div>
          <div class="debt-preview-value" id="debtPreview">0 ₸</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="cancelBtn">Отмена</button>
        <button class="btn-primary" id="saveBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Confirm dialog -->
  <div class="modal-overlay" id="confirmOverlay">
    <div class="modal confirm-modal" id="confirmModal">
      <div class="modal-header">
        <span class="modal-title">Удалить запись?</span>
      </div>
      <div class="modal-body">
        <p class="confirm-text">Это действие нельзя отменить.</p>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="confirmCancel">Отмена</button>
        <button class="btn-danger" id="confirmOk">Удалить</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
